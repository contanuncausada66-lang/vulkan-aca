name: Build & Deploy Vulkan Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: steamregistry20107.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: steamregistry20107.azurecr.io/vulkan-gpu:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Container App
        run: |
          az containerapp update \
            --name jupyter-gpu \
            --resource-group rg-container-gpu \
            --image steamregistry20107.azurecr.io/vulkan-gpu:${{ github.sha }}

      - name: Wait for rollout
        run: sleep 30

      - name: Verify container is running
        run: |
          az containerapp show \
            --name jupyter-gpu \
            --resource-group rg-container-gpu \
            --query "properties.runningStatus" -o tsv
